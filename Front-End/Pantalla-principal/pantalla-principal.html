<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/JZylber/SoqueTIC-Client@v1.4.2/soquetic-client.js"></script>
    <title>BIT-o</title>
    <script defer src="pantalla-principal.js" type="module"></script>
    <link rel="stylesheet" href="pantalla-principal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
</head>
<body>
    <div id="cambio-modo">
        <div id="selector-modo-oscuro">
            <div id="modo-oscuro"><img src="../Imagenes/Moon.png" alt="Modo oscuro" id="modo-oscuro-img"></div>
        </div>
        <div id="selector-modo-claro">
            <div id="modo-claro"><img src="../Imagenes/Sun.png" alt="Modo claro" id="modo-claro-img"></div>
        </div>
    </div>
    <header>
        <img src="../Imagenes/Logo-bito-chico-blanco.png" alt="logo BIT-o" id="logo">
        <div id="container-instrucciones">
            <h1 id="titulo">PANEL DE CONTROL</h1>
        </div>
    </header>
    <div class="busquedaESP" id="busquedaESP">
        <h2 class="busqueda" id="busqueda"></h2>
    </div>
    <main>
        <div class="camara" id="camara">
            <img src="http://10.18.32.35:81/stream" alt="ESP32-CAM"/>
        </div>
        <div class="auto" id="auto">
            <img src="../Imagenes/alertaDistanciaUp.png" alt="Alerta distancia arriba" class="overlay arriba" id="alertaUp">
            <img src="../Imagenes/alertaDistanciaDown.png" alt="Alerta distancia abajo" class="overlay abajo" id="alertaDown">
            <img src="../Imagenes/alertaDistanciaLeft.png" alt="Alerta distancia izquierda" class="overlay izquierda" id="alertaLeft">
            <img src="../Imagenes/alertaDistanciaRight.png" alt="Alerta distancia derecha" class="overlay derecha" id="alertaRight">
            <svg id="luzAdelante" class="overlay luzAdelante"width="213" height="204" viewBox="0 0 213 204" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip0_adelante)">
                <g clip-path="url(#clip1_adelante)">
                <path d="M38.379 34.4296C31.6005 33.3824 31.6006 23.6176 38.379 22.5704L152.834 4.88683C156.47 4.3251 159.75 7.13762 159.75 10.8165V46.1835C159.75 49.8624 156.47 52.6749 152.834 52.1132L38.379 34.4296Z" fill="currentColor"/>
                <circle cx="160" cy="28" r="25" fill="currentColor"/>
                </g>
                <g clip-path="url(#clip2_adelante)">
                <path d="M38.379 181.43C31.6005 180.382 31.6006 170.618 38.379 169.57L152.834 151.887C156.47 151.325 159.75 154.138 159.75 157.816V193.184C159.75 196.862 156.47 199.675 152.834 199.113L38.379 181.43Z" fill="currentColor"/>
                <circle cx="160" cy="175" r="25" fill="currentColor"/>
                </g>
            </g>
            <defs>
                <clipPath id="clip0_adelante"><rect width="213" height="204"/></clipPath>
                <clipPath id="clip1_adelante"><rect width="213" height="57"/></clipPath>
                <clipPath id="clip2_adelante"><rect width="213" height="57" transform="translate(0 147)"/></clipPath>
            </defs>
            </svg>
            <svg id="luzAtras" class="overlay luzAtras" width="213" height="204" viewBox="0 0 213 204" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip0_atras)">
                <g clip-path="url(#clip1_atras)">
                <path d="M38.379 34.4296C31.6005 33.3824 31.6006 23.6176 38.379 22.5704L152.834 4.88683C156.47 4.3251 159.75 7.13762 159.75 10.8165V46.1835C159.75 49.8624 156.47 52.6749 152.834 52.1132L38.379 34.4296Z" fill="currentColor"/>
                <circle cx="160" cy="28" r="25" fill="currentColor"/>
                </g>
                <g clip-path="url(#clip2_atras)">
                <path d="M38.379 181.43C31.6005 180.382 31.6006 170.618 38.379 169.57L152.834 151.887C156.47 151.325 159.75 154.138 159.75 157.816V193.184C159.75 196.862 156.47 199.675 152.834 199.113L38.379 181.43Z" fill="currentColor"/>
                <circle cx="160" cy="175" r="25" fill="currentColor"/>
                </g>
            </g>
            <defs>
                <clipPath id="clip0_atras"><rect width="213" height="204"/></clipPath>
                <clipPath id="clip1_atras"><rect width="213" height="57"/></clipPath>
                <clipPath id="clip2_atras"><rect width="213" height="57" transform="translate(0 147)"/></clipPath>
            </defs>
            </svg>
            <img src="../Imagenes/Carrocería.png" alt="foto del auto BITo" class="autoBito">
            <img src="../Imagenes/giro-izquierda.png" alt="aviso giro a la izquierda" class="overlay izquierdaGiro" id="izquierdaGiro">
            <img src="../Imagenes/giro-derecha.png" alt="aviso giro a la derecha" class="overlay derechaGiro" id="derechaGiro"> 
        </div>
    </main>
</body>
</html>
